<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tmal &mdash; Ваша почта</title>
  <link href="{% static 'mail/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'mail/mailbox.css' %}" rel="stylesheet">
</head>
<body>

<!-- ===== ШАПКА ===== -->
<header class="app-header">
  <div class="logo">
    <span class="l-t">T</span><span class="l-m">m</span><span class="l-a">a</span><span class="l-l">l</span>
  </div>
  <div class="header-spacer"></div>
  <div class="header-user" id="header-user"></div>
</header>

<div class="app-body">

  <!-- Боковая навигация -->
  <aside class="sidebar">
    <button class="btn-compose" id="btn-compose">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Написать
    </button>
    <a class="nav-item active" data-folder="inbox">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
          <path d="M3 7h18v10H3z"/>
          <path d="m3 8 9 6 9-6"/>
        </svg>
      </span> Входящие
      <span class="nav-badge" id="badge-inbox"></span>
    </a>
    <a class="nav-item" data-folder="sent">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
          <path d="M22 2 11 13"/>
          <path d="M22 2 15 22l-4-9-9-4z"/>
        </svg>
      </span> Отправленные
    </a>
    <a class="nav-item" data-folder="draft">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
          <path d="M12 20h9"/>
          <path d="m16.5 3.5 4 4L7 21H3v-4z"/>
        </svg>
      </span> Черновики
      <span class="nav-badge" id="badge-draft"></span>
    </a>
    <a class="nav-item" data-folder="archive">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
          <path d="M3 7h18v4H3z"/>
          <path d="M5 11h14v9H5z"/>
          <path d="M10 15h4"/>
        </svg>
      </span> Архив
    </a>
    <a class="nav-item" data-folder="trash">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
          <path d="M3 6h18"/>
          <path d="M8 6V4h8v2"/>
          <path d="M19 6l-1 14H6L5 6"/>
        </svg>
      </span> Корзина
    </a>
  </aside>

  <!-- Список писем -->
  <section class="email-section">
    <div class="email-section-header">
      <span id="folder-title">Входящие</span>
    </div>
    <div id="email-list"></div>
  </section>

  <!-- Просмотр письма -->
  <section class="email-view" id="email-view">
    <div class="ev-head">
      <button class="ev-close" id="ev-close" title="Закрыть">&times;</button>
      <div class="ev-subject" id="ev-subject"></div>
    </div>
    <div class="ev-meta" id="ev-meta"></div>
    <div class="ev-body" id="ev-body"></div>
    <div class="ev-actions" id="ev-actions"></div>
  </section>

</div>

<!-- ===== ПАНЕЛЬ СОЗДАНИЯ ПИСЬМА ===== -->
<div class="compose-panel" id="compose-panel">
  <div class="compose-header">
    <span>Новое письмо</span>
    <div class="compose-head-controls">
      <button class="compose-head-btn" id="compose-minimize" title="Свернуть">&minus;</button>
      <button class="compose-head-btn" id="compose-maximize" title="Развернуть">&#9723;</button>
      <button class="compose-x" id="compose-close">&times;</button>
    </div>
  </div>
  <div class="compose-field">
    <label>Кому</label>
    <input type="text" id="c-to" placeholder="адрес@tmal.ru" autocomplete="off">
  </div>
  <div class="compose-field">
    <label>Тема</label>
    <input type="text" id="c-subject" placeholder="Введите тему">
  </div>
  <div class="compose-body">
    <textarea id="c-body" placeholder="Введите сообщение..."></textarea>
  </div>
  <div class="compose-footer">
    <button class="btn-send" id="c-send">Отправить</button>
    <button class="btn-sec" id="c-draft">Черновик</button>
    <label class="attach-label" title="Прикрепить файл">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
      <input type="file" id="c-file" style="display:none">
    </label>
    <span class="attach-name" id="c-file-name"></span>
    <div id="c-msg" class="compose-msg"></div>
  </div>
</div>

<!-- ===== МОДАЛЬНОЕ ОКНО: ВХОД ===== -->
<div class="modal-bg" id="modal-login">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeModal('modal-login')">&times;</button>
    <h2>Войти</h2>
    <p class="modal-sub">в аккаунт <strong>Tmal</strong></p>
    <div class="field-group">
      <label>Имя пользователя</label>
      <input class="tmal-input" type="text" id="l-user" placeholder="Введите имя">
    </div>
    <div class="field-group">
      <label>Пароль</label>
      <input class="tmal-input" type="password" id="l-pass" placeholder="Введите пароль">
    </div>
    <div class="modal-err" id="l-err"></div>
    <div class="modal-row">
      <button class="modal-link" onclick="switchModal('modal-login','modal-reg')">Создать аккаунт</button>
      <button class="btn-modal" id="l-submit">Войти</button>
    </div>
  </div>
</div>

<!-- ===== МОДАЛЬНОЕ ОКНО: РЕГИСТРАЦИЯ ===== -->
<div class="modal-bg" id="modal-reg">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeModal('modal-reg')">&times;</button>
    <h2>Регистрация</h2>
    <p class="modal-sub">Ваш адрес: <strong id="preview-addr">username@tmal.ru</strong></p>
    <div class="field-group">
      <label>Имя пользователя</label>
      <div class="input-wrap">
        <input class="tmal-input pad-right" type="text" id="r-user" placeholder="Введите имя">
        <span class="input-suffix">@tmal.ru</span>
      </div>
    </div>
    <div class="field-group">
      <label>Пароль</label>
      <input class="tmal-input" type="password" id="r-pass" placeholder="Придумайте пароль">
    </div>
    <div class="modal-err" id="r-err"></div>
    <div class="modal-row">
      <button class="modal-link" onclick="switchModal('modal-reg','modal-login')">Уже есть аккаунт</button>
      <button class="btn-modal" id="r-submit">Создать</button>
    </div>
  </div>
</div>

<script src="{% static 'mail/mailbox.js' %}"></script>
<script src="{% static 'mail/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
